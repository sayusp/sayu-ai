<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ゆま商品紹介プロンプト作成</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#222;--muted:#6b7280;--border:#dfe3ea;--accent:#6c63ff;--accent2:#4f46e5;--ok:#0f766e}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}.wrap{max-width:880px;margin:0 auto;padding:24px 16px 48px}header{margin-bottom:18px}h1{font-size:1.65rem;margin:0 0 6px}.sub{color:var(--muted);font-size:.95rem}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:14px;box-shadow:0 5px 18px rgba(0,0,0,.04)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{display:block;font-weight:700;margin-bottom:6px}input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font:inherit}textarea{min-height:110px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;font:inherit;cursor:pointer}.primary{background:var(--accent);color:white}.primary:hover{background:var(--accent2)}.secondary{background:#eef0ff;color:#3730a3}.ghost{background:#eef2f7;color:#374151}.status{margin-top:10px;color:var(--ok);font-weight:700;min-height:1.6em}.output{min-height:320px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap}.note{background:#fff8e7;border:1px solid #f5d787;border-radius:12px;padding:12px 14px;font-size:.92rem;color:#6b4f00;margin-top:12px}small{color:var(--muted)}@media(max-width:680px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.wrap{padding:16px 12px 40px}h1{font-size:1.35rem}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>ゆま商品紹介プロンプト作成</h1><div class="sub">楽天の商品タイトルまたはURLを貼るだけで、ROOM紹介文とThreads投稿の指示文を作ります。</div></header>
<div class="card">
  <div class="grid">
    <div class="full"><label for="product">商品名・楽天商品タイトル</label><textarea id="product" placeholder="例：【1点883円～ 63％OFFクーポンで】楽天1位 収納ボックス..."></textarea><small>楽天の商品名を長いまま貼り付けて大丈夫です。</small></div>
    <div class="full"><label for="url">商品URL（任意）</label><input id="url" type="url" placeholder="https://item.rakuten.co.jp/..."></div>
    <div><label for="category">商品ジャンル</label><select id="category"><option value="自動判定">自動判定</option><option value="家電">家電</option><option value="キッチン用品">キッチン用品</option><option value="日用品">日用品</option><option value="収納用品">収納用品</option><option value="子ども用品">子ども用品</option><option value="美容・UV対策">美容・UV対策</option><option value="食品・スイーツ">食品・スイーツ</option><option value="ギフト">ギフト</option><option value="その他">その他</option></select></div>
    <div><label for="used">使用状況</label><select id="used"><option value="未使用">未使用</option><option value="使用済み">使用済み</option><option value="購入予定・気になっている">購入予定・気になっている</option></select></div>
    <div><label for="target">紹介したい相手（任意）</label><select id="target"><option value="指定なし">指定なし</option><option value="子育て家庭">子育て家庭</option><option value="共働き家庭">共働き家庭</option><option value="30代女性">30代女性</option><option value="一人暮らし">一人暮らし</option><option value="新生活">新生活</option><option value="プレゼントを探している人">プレゼントを探している人</option></select></div>
    <div><label for="tone">Threadsの雰囲気</label><select id="tone"><option value="家族の日常から自然につなげる">家族の日常</option><option value="困りごと・あるあるからつなげる">困りごと・あるある</option><option value="お得情報を軽く伝える">お得情報</option><option value="季節の悩みからつなげる">季節の悩み</option><option value="AIに最適な切り口を選ばせる">自動選択</option></select></div>
    <div class="full"><label for="features">確実に分かっている特徴・紹介したい点（任意）</label><textarea id="features" placeholder="例：折りたたみ、キャスター付き、5面開き、大容量"></textarea></div>
    <div class="full"><label for="sale">セール・クーポン情報（任意）</label><input id="sale" placeholder="例：63％OFFクーポンあり。内容は変更の可能性あり"></div>
    <div class="full"><label for="notes">備考（任意）</label><textarea id="notes" placeholder="例：収納に困っているママ向け。強すぎる煽りは避ける。"></textarea></div>
  </div>
  <div class="actions"><button class="primary" onclick="buildProductPrompt()">プロンプトを作成</button><button class="secondary" onclick="copyPrompt()">コピー</button><button class="ghost" onclick="clearForm()">クリア</button></div>
  <div id="status" class="status"></div>
</div>
<div class="card"><label for="output">完成プロンプト</label><textarea id="output" class="output" readonly placeholder="ここに完成した商品紹介用の指示文が表示されます"></textarea><div class="note">未使用を選んだ場合は、実際に使ったような体験談を書かないよう指示されます。楽天タイトル内の「楽天1位」「○％OFF」などは、入力された範囲を超えて断定しません。</div></div>
</div>
<script>
function buildProductPrompt(){const product=document.getElementById('product').value.trim();const url=document.getElementById('url').value.trim();const category=document.getElementById('category').value;const used=document.getElementById('used').value;const target=document.getElementById('target').value;const tone=document.getElementById('tone').value;const features=document.getElementById('features').value.trim();const sale=document.getElementById('sale').value.trim();const notes=document.getElementById('notes').value.trim();if(!product&&!url){document.getElementById('status').textContent='商品名またはURLを入力してください。';return}let p='【商品紹介モード】\n\n';if(product)p+=`商品名・楽天商品タイトル：\n${product}\n\n`;if(url)p+=`商品URL：${url}\n`;p+=`商品ジャンル：${category}\n使用状況：${used}\n紹介対象：${target}\nThreadsの切り口：${tone}\n`;if(features)p+=`確認できている特徴：${features}\n`;if(sale)p+=`セール・クーポン情報：${sale}\n`;if(notes)p+=`備考：${notes}\n`;p+='\nプロジェクト内の「12_楽天商品紹介ルール」「13_ROOM紹介文テンプレート」「14_Threads商品紹介ルール」を必ず参照してください。\n\n';p+='楽天商品タイトルに含まれる検索用・販促用の語句を整理し、商品の実質的な特徴を抽出してください。';p+='「楽天1位」「ランキング」「○％OFF」「送料無料」「期間限定」「予約販売」などは、ユーザーが入力した情報の範囲を超えて断定しないでください。\n';p+='未使用の場合は、使った・買った・家族が喜んだ等の体験談を作らないでください。';p+='商品情報にない性能、素材、サイズ、効果、価格、口コミを推測で追加しないでください。\n\n';p+='次の順番で、完成文のみを出力してください。\n\n【楽天ROOM紹介文】\n\n【Threads投稿】';document.getElementById('output').value=p;document.getElementById('status').textContent='商品紹介プロンプトを作成しました。'}
async function copyPrompt(){const text=document.getElementById('output').value;if(!text){document.getElementById('status').textContent='先にプロンプトを作成してください。';return}try{await navigator.clipboard.writeText(text);document.getElementById('status').textContent='コピーしました。'}catch(e){document.getElementById('output').select();document.execCommand('copy');document.getElementById('status').textContent='コピーしました。'}}
function clearForm(){['product','url','features','sale','notes','output'].forEach(id=>document.getElementById(id).value='');document.getElementById('category').value='自動判定';document.getElementById('used').value='未使用';document.getElementById('target').value='指定なし';document.getElementById('tone').value='家族の日常から自然につなげる';document.getElementById('status').textContent='';}
</script>
</body>
</html>
