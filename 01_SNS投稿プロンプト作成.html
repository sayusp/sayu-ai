<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNS投稿プロンプト作成</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#222;--muted:#6b7280;--border:#dfe3ea;--accent:#6c63ff;--accent2:#4f46e5;--ok:#0f766e}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}.wrap{max-width:880px;margin:0 auto;padding:24px 16px 48px}header{margin-bottom:18px}h1{font-size:1.65rem;margin:0 0 6px}.sub{color:var(--muted);font-size:.95rem}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:14px;box-shadow:0 5px 18px rgba(0,0,0,.04)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{display:block;font-weight:700;margin-bottom:6px}input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font:inherit}textarea{min-height:110px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;font:inherit;cursor:pointer}.primary{background:var(--accent);color:white}.primary:hover{background:var(--accent2)}.secondary{background:#eef0ff;color:#3730a3}.ghost{background:#eef2f7;color:#374151}.status{margin-top:10px;color:var(--ok);font-weight:700;min-height:1.6em}.output{min-height:290px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap}.note{background:#fff8e7;border:1px solid #f5d787;border-radius:12px;padding:12px 14px;font-size:.92rem;color:#6b4f00;margin-top:12px}@media(max-width:680px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.wrap{padding:16px 12px 40px}h1{font-size:1.35rem}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>SNS投稿プロンプト作成</h1><div class="sub">各キャラクター専用プロジェクトで使う、毎日の指示文を作ります。</div></header>
<div class="card">
  <div class="grid">
    <div><label for="date">日付</label><input id="date" type="date"></div>
    <div><label for="time">時間帯</label><select id="time"><option value="朝">朝</option><option value="昼">昼</option><option value="夜">夜</option></select></div>
    <div><label for="platform">媒体</label><select id="platform"><option value="Threads">Threads</option><option value="X">X</option><option value="XとThreadsの両方">XとThreadsの両方</option></select></div>
    <div><label for="guide">誘導</label><select id="guide"><option value="誘導なし">誘導なし</option><option value="LINE誘導あり">LINE誘導あり</option><option value="note誘導あり">note誘導あり</option><option value="ROOM誘導あり">ROOM誘導あり</option></select></div>
    <div class="full"><label for="theme">テーマ</label><input id="theme" placeholder="例：会社あるある、夫のひとこと、家族の日常"></div>
    <div class="full"><label for="notes">備考・入れたい内容（任意）</label><textarea id="notes" placeholder="例：軽め、質問で締める、前回と違う導入にする"></textarea></div>
  </div>
  <div class="actions"><button class="primary" onclick="buildPrompt()">プロンプトを作成</button><button class="secondary" onclick="copyPrompt()">コピー</button><button class="ghost" onclick="clearForm()">クリア</button></div>
  <div id="status" class="status"></div>
</div>
<div class="card"><label for="output">完成プロンプト</label><textarea id="output" class="output" readonly placeholder="ここに完成した指示文が表示されます"></textarea><div class="note">キャラクター名は入力不要です。開いている専用プロジェクトの人物として作成されます。</div></div>
</div>
<script>
const d=new Date();document.getElementById('date').value=d.toISOString().slice(0,10);
function formatDate(v){if(!v)return'指定なし';const[y,m,day]=v.split('-');return`${y}/${Number(m)}/${Number(day)}`}
function buildPrompt(){const date=formatDate(document.getElementById('date').value);const time=document.getElementById('time').value;const platform=document.getElementById('platform').value;const guide=document.getElementById('guide').value;const theme=document.getElementById('theme').value.trim()||'資料から最適なテーマを選択';const notes=document.getElementById('notes').value.trim();let p=`【投稿作成】\n\n日付：${date}\n時間帯：${time}\n媒体：${platform}\n誘導：${guide}\nテーマ：${theme}`;if(notes)p+=`\n備考：${notes}`;p+=`\n\nプロジェクト内の資料に従い、完成した投稿文をコピペできる形で出力してください。`;document.getElementById('output').value=p;document.getElementById('status').textContent='プロンプトを作成しました。'}
async function copyPrompt(){const text=document.getElementById('output').value;if(!text){document.getElementById('status').textContent='先にプロンプトを作成してください。';return}try{await navigator.clipboard.writeText(text);document.getElementById('status').textContent='コピーしました。'}catch(e){document.getElementById('output').select();document.execCommand('copy');document.getElementById('status').textContent='コピーしました。'}}
function clearForm(){document.getElementById('theme').value='';document.getElementById('notes').value='';document.getElementById('output').value='';document.getElementById('status').textContent='';}
</script>
</body>
</html>
